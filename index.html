<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Flappy Bird</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      background: linear-gradient(#4ec0ca 0%, #4ec0ca 75%, #ded895 75%, #ded895 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Segoe UI", system-ui, sans-serif;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
    }
    #wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    canvas {
      background: #4ec0ca;
      border: 3px solid #553847;
      border-radius: 8px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.25);
      touch-action: none;
      max-width: 100vw;
      max-height: 88vh;
    }
    #hint {
      color: #fff;
      font-size: 14px;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.4);
      user-select: none;
    }
    #bgPicker {
      display: flex;
      gap: 8px;
    }
    #bgPicker button {
      font: inherit;
      font-size: 13px;
      padding: 6px 14px;
      border: 2px solid #553847;
      border-radius: 999px;
      background: #fff;
      color: #553847;
      cursor: pointer;
      transition: transform 0.05s ease, background 0.15s ease;
    }
    #bgPicker button:hover { background: #ffe9a8; }
    #bgPicker button:active { transform: translateY(1px); }
    #bgPicker button.active {
      background: #f2d22e;
      box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.6) inset;
    }
  </style>
</head>
<body>
  <div id="wrap">
    <canvas id="game" width="400" height="600"></canvas>
    <div id="hint">Click, tap, or press Space to flap</div>
    <div id="bgPicker">
      <button data-bg="mountains">⛰️ Mountains</button>
      <button data-bg="clouds">☁️ Clouds</button>
      <button data-bg="ocean">🌊 Ocean</button>
    </div>
  </div>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const W = canvas.width;
    const H = canvas.height;

    // --- Tunables ---
    const GRAVITY = 0.45;
    const FLAP = -8;
    const PIPE_W = 60;
    const PIPE_GAP = 160;
    const PIPE_SPACING = 220;   // horizontal distance between pipe pairs
    const PIPE_SPEED = 2.2;
    const GROUND_H = 90;
    const BIRD_R = 14;

    const STATE = { READY: 0, PLAYING: 1, OVER: 2 };

    let state, bird, pipes, score, best, frame, unlocked, banner;
    best = Number(localStorage.getItem("flappyBest") || 0);

    const BACKGROUNDS = ["mountains", "clouds", "ocean"];
    let bg = localStorage.getItem("flappyBg");
    if (!BACKGROUNDS.includes(bg)) bg = "mountains";

    function reset() {
      state = STATE.READY;
      bird = { x: 90, y: H / 2, v: 0, rot: 0 };
      pipes = [];
      score = 0;
      frame = 0;
      unlocked = {};
      banner = null;
    }

    function rand(a, b) {
      return a + Math.random() * (b - a);
    }

    // Difficulty values derived from the current score (moderate, all capped).
    function difficulty() {
      return {
        speed: Math.min(3.4, PIPE_SPEED + score * 0.045),
        gap: Math.max(115, PIPE_GAP - score * 1.8),
        spacing: Math.max(170, PIPE_SPACING - score * 2.2),
        level: 1 + Math.floor(score / 5),
      };
    }

    function showBanner(text) {
      banner = { text: text, until: frame + 110 };
    }

    function spawnPipe() {
      const d = difficulty();
      const margin = 55;

      // Wide pipes unlock at score 14, with a rising chance.
      let w = PIPE_W;
      if (score >= 14 && Math.random() < Math.min(0.5, (score - 14) * 0.04)) {
        w = 90;
      }

      // Moving pipes unlock at score 8, with a rising chance.
      let amp = 0, mspeed = 0;
      if (score >= 8 && Math.random() < Math.min(0.6, (score - 8) * 0.04)) {
        amp = rand(28, 64);
        mspeed = rand(0.02, 0.04);
      }

      // Pick a base top that keeps the gap (plus mover travel) on the field.
      const lo = margin + amp;
      const hi = H - GROUND_H - d.gap - margin - amp;
      const baseTop = lo + Math.random() * Math.max(0, hi - lo);

      pipes.push({
        x: W,
        w: w,
        gap: d.gap,
        baseTop: baseTop,
        top: baseTop,
        amp: amp,
        mspeed: mspeed,
        phase: Math.random() * Math.PI * 2,
        passed: false,
      });
    }

    function flap() {
      if (state === STATE.READY) {
        state = STATE.PLAYING;
        bird.v = FLAP;
      } else if (state === STATE.PLAYING) {
        bird.v = FLAP;
      } else if (state === STATE.OVER) {
        reset();
      }
    }

    function gameOver() {
      state = STATE.OVER;
      if (score > best) {
        best = score;
        localStorage.setItem("flappyBest", String(best));
      }
    }

    function update() {
      frame++;
      if (state !== STATE.PLAYING) return;

      bird.v += GRAVITY;
      bird.y += bird.v;
      bird.rot = Math.max(-0.5, Math.min(1.2, bird.v / 12));

      const d = difficulty();

      // Spawn pipes based on the last pipe's position (spacing tightens).
      if (pipes.length === 0 || pipes[pipes.length - 1].x < W - d.spacing) {
        spawnPipe();
      }

      for (const p of pipes) {
        p.x -= d.speed;
        // Moving pipes oscillate their gap vertically.
        if (p.amp > 0) {
          p.top = p.baseTop + Math.sin(frame * p.mspeed + p.phase) * p.amp;
        }
        if (!p.passed && p.x + p.w < bird.x) {
          p.passed = true;
          score++;
        }
      }
      pipes = pipes.filter((p) => p.x + p.w > 0);

      // Announce newly unlocked challenges / level-ups via a brief banner.
      if (!unlocked.moving && score >= 8) { unlocked.moving = true; showBanner("↕ Moving pipes!"); }
      else if (!unlocked.wide && score >= 14) { unlocked.wide = true; showBanner("▭ Wide pipes!"); }
      else if (unlocked.lastLevel !== d.level && score > 0) {
        if (unlocked.lastLevel !== undefined) showBanner("⚡ Level " + d.level + " — faster & tighter!");
        unlocked.lastLevel = d.level;
      }

      // Collisions: ground / ceiling.
      if (bird.y + BIRD_R > H - GROUND_H) {
        bird.y = H - GROUND_H - BIRD_R;
        gameOver();
      }
      if (bird.y - BIRD_R < 0) {
        bird.y = BIRD_R;
        bird.v = 0;
      }

      // Collisions: pipes (circle vs rect, approximated by bird bounding box).
      for (const p of pipes) {
        const inX = bird.x + BIRD_R > p.x && bird.x - BIRD_R < p.x + p.w;
        if (inX) {
          const gapTop = p.top;
          const gapBottom = p.top + p.gap;
          if (bird.y - BIRD_R < gapTop || bird.y + BIRD_R > gapBottom) {
            gameOver();
          }
        }
      }
    }

    function drawBird() {
      ctx.save();
      ctx.translate(bird.x, bird.y);
      ctx.rotate(bird.rot);
      // body
      ctx.fillStyle = "#f2d22e";
      ctx.strokeStyle = "#553847";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(0, 0, BIRD_R, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
      // wing
      ctx.fillStyle = "#fff";
      ctx.beginPath();
      ctx.ellipse(-3, 3, 7, 4, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
      // eye
      ctx.fillStyle = "#fff";
      ctx.beginPath();
      ctx.arc(6, -5, 5, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
      ctx.fillStyle = "#000";
      ctx.beginPath();
      ctx.arc(8, -5, 2, 0, Math.PI * 2);
      ctx.fill();
      // beak
      ctx.fillStyle = "#e8702a";
      ctx.beginPath();
      ctx.moveTo(BIRD_R - 2, -2);
      ctx.lineTo(BIRD_R + 8, 0);
      ctx.lineTo(BIRD_R - 2, 4);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
      ctx.restore();
    }

    function drawPipe(p) {
      const w = p.w;
      const gapBottom = p.top + p.gap;
      const wide = w > PIPE_W;
      ctx.fillStyle = wide ? "#49a83b" : "#5bbf4a";
      ctx.strokeStyle = "#3a7d2f";
      ctx.lineWidth = 3;
      const lip = 14;
      // top pipe
      ctx.fillRect(p.x, 0, w, p.top);
      ctx.strokeRect(p.x, 0, w, p.top);
      ctx.fillRect(p.x - 4, p.top - lip, w + 8, lip);
      ctx.strokeRect(p.x - 4, p.top - lip, w + 8, lip);
      // bottom pipe
      const bh = H - GROUND_H - gapBottom;
      ctx.fillRect(p.x, gapBottom, w, bh);
      ctx.strokeRect(p.x, gapBottom, w, bh);
      ctx.fillRect(p.x - 4, gapBottom, w + 8, lip);
      ctx.strokeRect(p.x - 4, gapBottom, w + 8, lip);
    }

    function drawGround() {
      ctx.fillStyle = "#ded895";
      ctx.fillRect(0, H - GROUND_H, W, GROUND_H);
      ctx.fillStyle = "#cbbd6f";
      ctx.fillRect(0, H - GROUND_H, W, 6);
      // simple grass stripes
      ctx.fillStyle = "#5bbf4a";
      ctx.fillRect(0, H - GROUND_H, W, 14);
      ctx.fillStyle = "#3a7d2f";
      ctx.fillRect(0, H - GROUND_H + 14, W, 4);
    }

    function skyGradient(top, bottom) {
      const g = ctx.createLinearGradient(0, 0, 0, H - GROUND_H);
      g.addColorStop(0, top);
      g.addColorStop(1, bottom);
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, W, H - GROUND_H);
    }

    function drawCloud(x, y, s) {
      ctx.fillStyle = "rgba(255,255,255,0.9)";
      ctx.beginPath();
      ctx.arc(x, y, 18 * s, 0, Math.PI * 2);
      ctx.arc(x + 20 * s, y - 8 * s, 22 * s, 0, Math.PI * 2);
      ctx.arc(x + 44 * s, y, 18 * s, 0, Math.PI * 2);
      ctx.arc(x + 22 * s, y + 6 * s, 20 * s, 0, Math.PI * 2);
      ctx.fill();
    }

    function bgMountains() {
      skyGradient("#7ec8e3", "#cdeefb");
      // sun
      ctx.fillStyle = "rgba(255,241,150,0.9)";
      ctx.beginPath();
      ctx.arc(W - 70, 80, 34, 0, Math.PI * 2);
      ctx.fill();
      const base = H - GROUND_H;
      // back range
      ctx.fillStyle = "#9aa7c7";
      const back = [[-20, 320], [80, 200], [180, 290], [300, 190], [420, 300]];
      ctx.beginPath();
      ctx.moveTo(-20, base);
      for (const [x, y] of back) ctx.lineTo(x, y);
      ctx.lineTo(420, base);
      ctx.closePath();
      ctx.fill();
      // front range
      ctx.fillStyle = "#6d7fa8";
      const front = [[-20, 420], [120, 280], [260, 400], [400, 300], [440, 360]];
      ctx.beginPath();
      ctx.moveTo(-20, base);
      for (const [x, y] of front) ctx.lineTo(x, y);
      ctx.lineTo(440, base);
      ctx.closePath();
      ctx.fill();
      // snow caps
      ctx.fillStyle = "rgba(255,255,255,0.85)";
      ctx.beginPath();
      ctx.moveTo(120, 280); ctx.lineTo(135, 300); ctx.lineTo(105, 300); ctx.closePath();
      ctx.moveTo(400, 300); ctx.lineTo(415, 320); ctx.lineTo(385, 320); ctx.closePath();
      ctx.fill();
    }

    function bgClouds() {
      skyGradient("#4aa3df", "#a9dcf5");
      drawCloud(60, 120, 1.1);
      drawCloud(230, 90, 1.4);
      drawCloud(150, 230, 0.9);
      drawCloud(300, 200, 1.1);
      drawCloud(40, 330, 1.2);
    }

    function bgOcean() {
      skyGradient("#6fc6e0", "#bdeeff");
      const base = H - GROUND_H;
      // water band above the ground
      const horizon = base - 120;
      const g = ctx.createLinearGradient(0, horizon, 0, base);
      g.addColorStop(0, "#1b6ca8");
      g.addColorStop(1, "#0f4c75");
      ctx.fillStyle = g;
      ctx.fillRect(0, horizon, W, base - horizon);
      // sun glow
      ctx.fillStyle = "rgba(255,247,200,0.85)";
      ctx.beginPath();
      ctx.arc(80, 90, 30, 0, Math.PI * 2);
      ctx.fill();
      // wave highlights
      ctx.strokeStyle = "rgba(255,255,255,0.4)";
      ctx.lineWidth = 2;
      for (let i = 0; i < 4; i++) {
        const y = horizon + 24 + i * 26;
        ctx.beginPath();
        for (let x = 0; x <= W; x += 20) {
          const yy = y + Math.sin((x + frame * 1.5 + i * 30) / 22) * 3;
          if (x === 0) ctx.moveTo(x, yy); else ctx.lineTo(x, yy);
        }
        ctx.stroke();
      }
    }

    function drawBackground() {
      if (bg === "clouds") bgClouds();
      else if (bg === "ocean") bgOcean();
      else bgMountains();
    }

    function centerText(text, y, size, color) {
      ctx.fillStyle = color;
      ctx.font = "bold " + size + "px 'Segoe UI', sans-serif";
      ctx.textAlign = "center";
      ctx.fillText(text, W / 2, y);
    }

    function draw() {
      drawBackground();

      for (const p of pipes) drawPipe(p);
      drawGround();
      drawBird();

      // Score (during play / over)
      ctx.save();
      ctx.shadowColor = "rgba(0,0,0,0.35)";
      ctx.shadowBlur = 4;
      centerText(String(score), 70, 44, "#fff");
      ctx.restore();

      // Level indicator + unlock banner (while playing).
      if (state === STATE.PLAYING) {
        ctx.save();
        ctx.shadowColor = "rgba(0,0,0,0.35)";
        ctx.shadowBlur = 3;
        ctx.fillStyle = "#fff";
        ctx.font = "bold 16px 'Segoe UI', sans-serif";
        ctx.textAlign = "left";
        ctx.fillText("LV " + difficulty().level, 12, 28);
        if (banner && frame < banner.until) {
          const left = banner.until - frame;
          ctx.globalAlpha = Math.min(1, left / 40);
          centerText(banner.text, 130, 22, "#fff");
        }
        ctx.restore();
      }

      if (state === STATE.READY) {
        ctx.save();
        ctx.fillStyle = "rgba(0,0,0,0.15)";
        ctx.fillRect(0, 0, W, H);
        centerText("FLAPPY BIRD", H / 2 - 40, 40, "#fff");
        centerText("Click / Tap / Space to start", H / 2 + 4, 18, "#fff");
        centerText("Best: " + best, H / 2 + 36, 16, "#fff");
        ctx.restore();
      } else if (state === STATE.OVER) {
        ctx.save();
        ctx.fillStyle = "rgba(0,0,0,0.4)";
        ctx.fillRect(0, 0, W, H);
        centerText("GAME OVER", H / 2 - 50, 40, "#fff");
        centerText("Score: " + score, H / 2, 24, "#fff");
        centerText("Best: " + best, H / 2 + 32, 20, "#fff");
        centerText("Click / Tap / Space to restart", H / 2 + 70, 16, "#fff");
        ctx.restore();
      }
    }

    function loop() {
      update();
      draw();
      requestAnimationFrame(loop);
    }

    // --- Input ---
    function onPress(e) {
      e.preventDefault();
      flap();
    }
    canvas.addEventListener("mousedown", onPress);
    canvas.addEventListener("touchstart", onPress, { passive: false });
    window.addEventListener("keydown", (e) => {
      if (e.code === "Space" || e.code === "ArrowUp") {
        e.preventDefault();
        flap();
      }
    });

    // --- Background picker ---
    const bgButtons = document.querySelectorAll("#bgPicker button");
    function updateBgButtons() {
      bgButtons.forEach((b) => b.classList.toggle("active", b.dataset.bg === bg));
    }
    bgButtons.forEach((b) => {
      b.addEventListener("click", () => {
        bg = b.dataset.bg;
        localStorage.setItem("flappyBg", bg);
        updateBgButtons();
      });
    });
    updateBgButtons();

    reset();
    loop();
  </script>
</body>
</html>
